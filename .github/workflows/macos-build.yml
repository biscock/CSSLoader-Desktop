name: macOS Build

# This is the entry point for verifying that biscock's macOS port keeps
# compiling on every push/PR. It produces an unsigned .app bundle that can
# be downloaded as a build artifact \u2014 for actual macOS releases we still
# rely on the regular release.yml workflow.
#
# We do NOT build .dmg here: Tauri 1.x's bundled bundle_dmg.sh is flaky on
# the GitHub-hosted Apple-silicon runners (it relies on AppleScript hooks
# that fail headless), and a zipped .app is just as good for distribution.

on:
  push:
    branches:
      - main
      - master
      - "macos-*"
      - "devin/**"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-mac:
    name: Build macOS (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend bundle
        run: |
          npm run build
          npm run export

      # Build the Tauri app directly with cargo-tauri to avoid pulling in the
      # release-publishing logic from tauri-action. We just want a .dmg out.
      - name: Install Tauri CLI
        run: npm install --save-dev @tauri-apps/cli@^1.2.3

      - name: Build Tauri app
        env:
          # The bundle is unsigned by design (signingIdentity: null in
          # tauri.conf.json). The README documents the
          # ``xattr -dr com.apple.quarantine`` step macOS users need on first
          # launch. Do NOT set APPLE_SIGNING_IDENTITY here \u2014 even an
          # empty string is interpreted as "sign with identity ''", which
          # then fails because there is no matching keychain identity.
          CI: "true"
        run: npx tauri build --target ${{ matrix.target }} --bundles app

      - name: Zip .app for upload
        # ``ditto`` preserves macOS resource forks, extended attributes and
        # symlinks inside the bundle. ``zip -r`` is lossy and would leave the
        # downloaded .app broken.
        working-directory: src-tauri/target/${{ matrix.target }}/release/bundle/macos
        run: ditto -c -k --sequesterRsrc --keepParent "CSSLoader Desktop.app" "CSSLoader-Desktop-${{ matrix.arch }}.zip"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: CSSLoader-Desktop-macOS-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/CSSLoader-Desktop-${{ matrix.arch }}.zip
          if-no-files-found: error
