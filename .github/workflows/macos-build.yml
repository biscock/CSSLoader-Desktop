name: macOS Build

# This is the entry point for verifying that biscock's macOS port keeps
# compiling on every push/PR. It produces an unsigned .dmg and a .app bundle
# that can be downloaded as a build artifact \u2014 for actual macOS releases
# we still rely on the regular release.yml workflow.

on:
  push:
    branches:
      - main
      - master
      - "macos-*"
      - "devin/**"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-mac:
    name: Build macOS (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-13
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend bundle
        run: |
          npm run build
          npm run export

      # Build the Tauri app directly with cargo-tauri to avoid pulling in the
      # release-publishing logic from tauri-action. We just want a .dmg out.
      - name: Install Tauri CLI
        run: npm install --save-dev @tauri-apps/cli@^1.2.3

      - name: Build Tauri app
        env:
          # The bundle is unsigned by design \u2014 see README for the
          # ``xattr -dr com.apple.quarantine`` workaround macOS users need.
          APPLE_SIGNING_IDENTITY: ""
          CI: "true"
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: CSSLoader-Desktop-macOS-${{ matrix.arch }}-dmg
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: CSSLoader-Desktop-macOS-${{ matrix.arch }}-app
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          if-no-files-found: warn
